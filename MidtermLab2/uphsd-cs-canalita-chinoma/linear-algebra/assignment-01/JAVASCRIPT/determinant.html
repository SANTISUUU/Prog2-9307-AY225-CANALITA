<!DOCTYPE html>
<html>

<head>
<title>3x3 Determinant Solver</title>

<style>

body{
    background:#0f172a;
    font-family: Consolas, monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:#e2e8f0;
}

.container{
    width:700px;
}

.title{
    text-align:center;
    font-size:24px;
    margin-bottom:20px;
}

.terminal{
    background:#020617;
    border-radius:10px;
    padding:25px;
    box-shadow:0 0 20px rgba(0,0,0,.6);
    border:1px solid #1e293b;
}

.header{
    display:flex;
    gap:8px;
    margin-bottom:15px;
}

.dot{
    width:12px;
    height:12px;
    border-radius:50%;
}

.red{background:#ef4444;}
.yellow{background:#facc15;}
.green{background:#22c55e;}

pre{
    white-space:pre-wrap;
    line-height:1.5;
}

</style>

</head>

<body>

<div class="container">

<div class="title">
3x3 Matrix Determinant Solver
</div>

<div class="terminal">

<div class="header">
<div class="dot red"></div>
<div class="dot yellow"></div>
<div class="dot green"></div>
</div>

<pre id="output"></pre>

</div>
</div>

<script>

// STUDENT INFO
const studentName = "CHINO MA SANTI F CANALITA";

// MATRIX
const matrix = [
[1,4,2],
[3,2,5],
[6,1,3]
];

// 2x2 determinant
function computeMinor(a,b,c,d){
return (a*d)-(b*c);
}

// Solver
function solveDeterminant(m){

let out="";

const line="====================================================";

out+=line+"\n";
out+="  3x3 MATRIX DETERMINANT SOLVER\n";
out+="  Student: "+studentName+"\n";
out+="  Assigned Matrix:\n";
out+=line+"\n\n";

m.forEach(r=>{
out+="| "+r.join("  ")+" |\n";
});

out+="\n"+line+"\n\n";
out+="Expanding along Row 1 (cofactor expansion):\n\n";

const minor11=computeMinor(m[1][1],m[1][2],m[2][1],m[2][2]);
const minor12=computeMinor(m[1][0],m[1][2],m[2][0],m[2][2]);
const minor13=computeMinor(m[1][0],m[1][1],m[2][0],m[2][1]);

out+="Step 1 - Minor M11: det(["+m[1][1]+","+m[1][2]+"],["+m[2][1]+","+m[2][2]+"])\n";
out+="= ("+m[1][1]+"×"+m[2][2]+") - ("+m[1][2]+"×"+m[2][1]+") = "+minor11+"\n\n";

out+="Step 2 - Minor M12: det(["+m[1][0]+","+m[1][2]+"],["+m[2][0]+","+m[2][2]+"])\n";
out+="= ("+m[1][0]+"×"+m[2][2]+") - ("+m[1][2]+"×"+m[2][0]+") = "+minor12+"\n\n";

out+="Step 3 - Minor M13: det(["+m[1][0]+","+m[1][1]+"],["+m[2][0]+","+m[2][1]+"])\n";
out+="= ("+m[1][0]+"×"+m[2][1]+") - ("+m[1][1]+"×"+m[2][0]+") = "+minor13+"\n\n";

const c11=m[0][0]*minor11;
const c12=-m[0][1]*minor12;
const c13=m[0][2]*minor13;

out+="Cofactor C11 = (+1) × "+m[0][0]+" × "+minor11+" = "+c11+"\n";
out+="Cofactor C12 = (-1) × "+m[0][1]+" × "+minor12+" = "+c12+"\n";
out+="Cofactor C13 = (+1) × "+m[0][2]+" × "+minor13+" = "+c13+"\n\n";

const det=c11+c12+c13;

out+="det(M) = "+c11+" + ("+c12+") + "+c13+"\n\n";

out+=line+"\n";
out+="✓ DETERMINANT = "+det+"\n";
out+=line;

document.getElementById("output").textContent=out;

}

solveDeterminant(matrix);

</script>

</body>
</html>
